name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        ndk-version: 26.1.10909125 # Or a specific version compatible with your project
        build-tools-version: 34.0.0

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "GITHUB_CLIENT_ID=dummy_id" >> local.properties
        echo "GITHUB_CLIENT_SECRET=dummy_secret" >> local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |-
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |-
          ${{ runner.os }}-gradle-

    - name: Cache NDK and CMake build artifacts
      uses: actions/cache@v4
      with:
        path: |-
          ${{ github.workspace }}/.cxx
          ${{ github.workspace }}/app/.cxx
          ${{ github.workspace }}/llama/.cxx
          ${{ github.workspace }}/mnn/.cxx
          ${{ github.workspace }}/mmd/.cxx
          ${{ github.workspace }}/dragonbones/.cxx
          ${{ github.workspace }}/terminal/.cxx
        key: ${{ runner.os }}-ndk-cmake-${{ hashFiles('**/CMakeLists.txt', '**/*.gradle*') }}
        restore-keys: |-
          ${{ runner.os }}-ndk-cmake-

    - name: Build Debug APK
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug'
      run: ./gradlew assembleDebug

    - name: Build Release APK
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
